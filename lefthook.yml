pre-push:
  parallel: true
  commands:
    audit:
      run: pnpm audit --audit-level medium

pre-commit:
  parallel: true
  commands:
    biome-check:
      run: pnpm biome lint --write && pnpm biome format --write
      stage_fixed: true

    typecheck:
      run: pnpm typecheck

    spell:
      run: pnpm spell
